<html>
<head>
<title> @media query </title>
<style>
body
{
background:white;
font-family:arial;
font-size:100px;
}
@media screen and (max-width:1200px)
{
body
{
background:pink;
font-size:70px;
}
}
@media screen and (max-width:1000px)
{
body
{
background:blue;
font-size:50px;
}
}
@media screen and (max-width:700px)
{
body
{
background:grey;
font-size:20px;
}
}
</style>
</head>
<body>
<h1> Hello! Welcome to Web Designing Class. </h1>
</body>
</html>
