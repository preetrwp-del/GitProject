<!doctype html>
<html>
<head>
  <title>REGISTRATION FORM</title>
</head>
<body>
  <center>
    <h2>REGISTRATION FORM</h2>

    <form>
      <table border="1" cellpadding="8">
        <tr>
          <td>Student Name</td>
          <td><input type="text" placeholder="First Name"></td>
          <td><input type="text" placeholder="Middle Name"></td>
          <td><input type="text" placeholder="Last Name"></td>
        </tr>

        <tr>
          <td>Father's Name</td>
          <td><input type="text" placeholder="Enter your Father's Name"></td>
          <td>Mother Name</td>
          <td><input type="text" placeholder="Enter your Mother's Name"></td>
        </tr>

        <tr>
          <td>Date of Birth</td>
          <td><input type="date"></td>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
          </td>
        </tr>

        <tr>
          <td>Category</td>
          <td>
            <input type="radio" name="cat"> General
            <input type="radio" name="cat"> OBC
            <input type="radio" name="cat"> SC/ST
          </td>
          <td>Handicapped</td>
          <td>
            <input type="radio" name="handi"> Yes
            <input type="radio" name="handi"> No
          </td>
        </tr>

        <tr>
          <td>Ex-Serviceman</td>
          <td>
            <input type="radio" name="ex"> Yes
            <input type="radio" name="ex"> No
          </td>
          <td></td>
          <td></td>
        </tr>

        <tr>
          <td>State</td>
          <td>
            <select>
              <option>Select any One</option>
              <option>Punjab</option>
              <option>Haryana</option>
              <option>Delhi</option>
            </select>
          </td>
          <td>City</td>
          <td>
            <select>
              <option>Select any One</option>
              <option>Chandigarh</option>
              <option>Ludhiana</option>
              <option>Amritsar</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Upload Photo</td>
          <td><input type="file"></td>
          <td>Upload Signature</td>
          <td><input type="file"></td>
        </tr>

        <tr>
          <td colspan="4" align="center">
            <input type="submit" name="submit">
          </td>
        </tr>
      </table>
    </form>
  </center>
</body>
</html>
